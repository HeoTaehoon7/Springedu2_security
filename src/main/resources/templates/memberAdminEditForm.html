<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 수정</title>
    <link rel="stylesheet" href="/css/visitor.css" />
    <style>
        .box { width: 420px; margin: 40px auto; padding: 24px; border: 1px solid #ddd; border-radius: 12px; background: #fff; }
        label { display: block; margin: 12px 0; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 16px; margin-top: 10px; }
        .msg { color: #2563eb; }
        .error { color: #dc2626; }
        .hint { background: #f3f4f6; padding: 10px; border-radius: 8px; font-size: 14px; }
    </style>

</head>
<body>
<div class="box">
    <h2>회원 수정</h2>
    <p>아이디: <strong th:text="${member.username}"></strong></p>
    <form method="post"
          th:action="@{/admin/members/{id}/edit(id=${member.id})}"
          th:object="${memberForm}" >
        <div class="error" th:if="${#fields.hasGlobalErrors()}"
             th:each="err : ${#fields.globalErrors()}"
             th:text="${err}" ></div>

        <label>이름
            <input type="text" th:field="*{name}" placeholder="최대 30자" required>
            <span class="error" th:errors="*{name}"></span>
        </label>

        <label>이메일
            <input type="email" th:field="*{email}" placeholder="120자 까지" required>
            <span class="error" th:errors="*{email}"></span>
        </label>

        <label>새 비밀번호
            <input type="password" th:field="*{password}" placeholder="4자 이상" required>
            <span class="error" th:errors="*{password}"></span>
        </label>

        <button type="submit">가입</button>
        <a th:href="@{/login}"><button type="button">로그인으로</button></a>
    </form>

</div>
</body>
</html>
